  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #00f0ff;
      --secondary: #7000ff;
      --accent: #ff006e;
      --dark: #0a0e27;
      --darker: #050816;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--darker);
      color: #fff;
      overflow-x: hidden;
      position: relative;
    }

    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: linear-gradient(45deg, var(--darker) 0%, var(--dark) 100%);
    }

    .bg-animation::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, var(--primary) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridMove 20s linear infinite;
      opacity: 0.1;
    }

    @keyframes gridMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(50px, 50px); }
    }

    header {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 20px 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      background: rgba(10, 14, 39, 0.8);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0, 240, 255, 0.2);
      animation: slideDown 0.8s ease;
    }

    @keyframes slideDown {
      from { transform: translateY(-100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    header h1 {
      font-size: 1.8rem;
      background: linear-gradient(45deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      position: relative;
    }

    header h1::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 0;
      width: 50%;
      height: 2px;
      background: var(--primary);
      animation: underlineExpand 2s ease infinite;
    }

    @keyframes underlineExpand {
      0%, 100% { width: 50%; }
      50% { width: 100%; }
    }

    nav ul {
      display: flex;
      gap: 30px;
      list-style: none;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      font-weight: 500;
      position: relative;
      padding: 5px 15px;
      transition: all 0.3s;
      text-transform: uppercase;
      font-size: 0.9rem;
      letter-spacing: 1px;
    }

    nav a::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 2px solid var(--primary);
      transform: scale(0);
      transition: transform 0.3s;
      opacity: 0;
    }

    nav a:hover::before {
      transform: scale(1);
      opacity: 1;
    }

    nav a:hover {
      color: var(--primary);
      text-shadow: 0 0 10px var(--primary);
    }

    main {
      margin-top: 120px;
      padding: 50px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .content {
      width: 100%;
      max-width: 1000px;
    }

    .section-title {
      font-size: 2.5rem;
      text-align: center;
      margin-bottom: 30px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(0, 240, 255, 0.2);
      border-radius: 20px;
      padding: 30px;
      backdrop-filter: blur(10px);
    }

    .card p {
      color: rgba(255, 255, 255, 0.85);
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .file-link {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 30px;
      background: linear-gradient(45deg, var(--primary), var(--secondary));
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .file-link:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0, 240, 255, 0.3);
    }

    footer {
      text-align: center;
      padding: 30px;
      background: rgba(10, 14, 39, 0.8);
      backdrop-filter: blur(10px);
      border-top: 1px solid rgba(0, 240, 255, 0.2);
      margin-top: 100px;
    }

    footer p {
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.9rem;
    }

    @media (max-width: 768px) {
      header {
        padding: 15px 20px;
        flex-direction: column;
        gap: 20px;
      }

      nav ul {
        gap: 15px;
        flex-wrap: wrap;
        justify-content: center;
      }

      main {
        padding: 20px;
      }

      .section-title {
        font-size: 2rem;
      }
    }
  </style>
</head>
